events {
    worker_connections 2048;
}

http {
    # Upstream definitions
    upstream backend {
        server bs-backend:4000;
        keepalive 32;
    }

    upstream frontend {
        server bs-frontend:3000;
        keepalive 32;
    }

    upstream stats {
        server bs-stats:8050;
    }

    upstream visualizer {
        server bs-visualizer:8050;
    }

    # Increase header buffer size to avoid HTTP 431 errors
    large_client_header_buffers 4 32k;
    client_header_buffer_size 8k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_buffering off;

            # IMPORTANT: request uncompressed HTML from the frontend so sub_filter
            # can match. Browsers send Accept-Encoding: gzip; without this the
            # upstream gzips the response and the injection below silently no-ops.
            # nginx re-applies gzip to the client via the http-level gzip directive.
            proxy_set_header Accept-Encoding "";

            # Inject custom CSS and JS for branding
            sub_filter '</head>' '<link rel="stylesheet" href="/custom.css"><script src="/hide-blockscout.js"></script></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # Serve custom CSS
        location = /custom.css {
            alias /usr/share/nginx/assets/custom.css;
            add_header Content-Type text/css;
            add_header Cache-Control "no-cache";
        }

        # Serve custom JS
        location = /hide-blockscout.js {
            alias /usr/share/nginx/assets/hide-blockscout.js;
            add_header Content-Type application/javascript;
            add_header Cache-Control "no-cache";
        }

        # Branding assets — served same-origin so the BROWSER can fetch them.
        # (The frontend env previously pointed these at http://bs-assets/... which
        #  is a Docker-internal hostname the browser cannot resolve.)
        location = /logo.svg {
            alias /usr/share/nginx/assets/logo.svg;
            default_type image/svg+xml;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*" always;
        }
        location = /logo-dark.svg {
            alias /usr/share/nginx/assets/logo-dark.svg;
            default_type image/svg+xml;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*" always;
        }
        location = /icon.png {
            alias /usr/share/nginx/assets/icon.png;
            default_type image/png;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*" always;
        }
        location = /footer.json {
            alias /usr/share/nginx/assets/footer.json;
            default_type application/json;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # Override all favicon requests with custom favicon
        location = /favicon.ico {
            alias /usr/share/nginx/assets/favicon.png;
            default_type image/png;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        location ~ ^/favicon/.*\.(ico|png|svg)$ {
            alias /usr/share/nginx/assets/favicon.png;
            default_type image/png;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Backend API
        location /api {
            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-csrf-token,updated-gas-oracle' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Strip browser cookies — Cowboy (Elixir) rejects requests with large
            # cookie headers (HTTP 431). The API uses x-csrf-token, not cookies.
            proxy_set_header Cookie "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            
            # Hide backend's CORS headers (if any) to avoid duplicates
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Expose-Headers';
            
            # Add CORS headers - nginx handles all CORS
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-csrf-token,updated-gas-oracle' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        }

        # WebSocket for real-time updates
        location /socket {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie "";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Stats API - proxy to stats service
        location /api/v1/stats {
            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            proxy_pass http://stats/api/v1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        }
        
        # Stats API - counters and lines endpoints
        location ~ ^/api/v1/(counters|lines) {
            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            # Proxy to stats service preserving the FULL path (e.g. /api/v1/lines/newBlocks).
            # NOTE: with a regex location, a URI in proxy_pass does NOT append the unmatched
            # suffix, so http://stats/api/v1/$1 dropped the chart name and broke all line charts.
            # Passing the bare upstream forwards the original request URI unchanged.
            proxy_pass http://stats;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        }

        # Visualizer API
        location /api/v1/solidity {
            proxy_pass http://visualizer;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # CSRF token endpoint
        location /csrf {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie "";
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

    }
}